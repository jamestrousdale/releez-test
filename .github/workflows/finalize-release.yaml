name: Finalize release

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  finalize:
    name: Finalize release
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == true &&
      (
        startsWith(github.event.pull_request.head.ref, 'release/')
        || startsWith(github.event.pull_request.head.ref, 'support/')
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install mise tools
        uses: jdx/mise-action@v3

      - name: Releez finalize
        id: releez
        uses: hotdog-werx/releez-finalize-action@v0
        with:
          is-full-release: 'true'

      # Note: Next two steps lifted from releez-finalize-action to allow testing
      - name: Git config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        shell: bash

      - name: Finalize release
        id: finalize-release
        env:
          RELEEZ_GITHUB_TOKEN: ${{ github.token }}
        run: |
          #!/bin/bash
          set -euo pipefail

          releaseNotes=$(uvx releez release notes ${versionOverrideArgs[@]})

          uvx releez release tag  \
            ${versionOverrideArgs[@]} \
            ${aliasVersionsArgs[@]}
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.releez.outputs.release-version }}
          body: ${{ steps.releez.outputs.release-notes }}
